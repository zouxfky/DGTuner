# Local Docker runtime. Most users only need to change host_ip if auto-detection
# chooses the wrong non-loopback address.
docker_runtime:
  host_ip: "auto"
  compose_file: "docker-compose.yml"
  executor_heap:
    xms: "32g"
    xmx: "32g"
    soft_max: "32g"
    max_direct_memory: "4096m"
  containers:
    - "coordinator1"
    - "coordinator2"
    - "coordinator3"
    - "store1"
    - "store2"
    - "store3"
    - "index1"
    - "index2"
    - "index3"
    - "executor"
    - "proxy"

workload_client:
  protocol: "mysql"
  mode: "docker"
  image: "mysql:5.7"
  network: "host"
  host: "127.0.0.1"
  port: 3307
  user: "root"
  password: "123123"
  timeout_seconds: 1800

ssh:
  enabled: false

lifecycle:
  enabled: true
  start: "python3 -m databases.dingodb.docker_runtime start"
  restart: "python3 -m databases.dingodb.docker_runtime restart"
  start_check: "python3 -m databases.dingodb.docker_runtime check"
  stop: "python3 -m databases.dingodb.docker_runtime stop"
  stop_check: "python3 -m databases.dingodb.docker_runtime stop-check"
  clear_log: "python3 -m databases.dingodb.docker_runtime clear-log"
  max_retries: 120
  max_minutes: 7

restart:
  containers:
    - "coordinator1"
    - "coordinator2"
    - "coordinator3"
    - "store1"
    - "store2"
    - "store3"
    - "index1"
    - "index2"
    - "index3"
  ensure_running:
    - "executor"
    - "proxy"
  settle_seconds: 5

config_apply:
  method: "docker"
  docker:
    roles:
      coordinator:
        - container: "coordinator1"
          yaml: "/opt/dingo-store/dist/coordinator1/conf/coordinator.yaml"
          gflags: "/opt/dingo-store/dist/coordinator1/conf/gflags.conf"
        - container: "coordinator2"
          yaml: "/opt/dingo-store/dist/coordinator1/conf/coordinator.yaml"
          gflags: "/opt/dingo-store/dist/coordinator1/conf/gflags.conf"
        - container: "coordinator3"
          yaml: "/opt/dingo-store/dist/coordinator1/conf/coordinator.yaml"
          gflags: "/opt/dingo-store/dist/coordinator1/conf/gflags.conf"
      store:
        - container: "store1"
          yaml: "/opt/dingo-store/dist/store1/conf/store.yaml"
          gflags: "/opt/dingo-store/dist/store1/conf/gflags.conf"
        - container: "store2"
          yaml: "/opt/dingo-store/dist/store1/conf/store.yaml"
          gflags: "/opt/dingo-store/dist/store1/conf/gflags.conf"
        - container: "store3"
          yaml: "/opt/dingo-store/dist/store1/conf/store.yaml"
          gflags: "/opt/dingo-store/dist/store1/conf/gflags.conf"
      index:
        - container: "index1"
          yaml: "/opt/dingo-store/dist/index1/conf/index.yaml"
          gflags: "/opt/dingo-store/dist/index1/conf/gflags.conf"
        - container: "index2"
          yaml: "/opt/dingo-store/dist/index1/conf/index.yaml"
          gflags: "/opt/dingo-store/dist/index1/conf/gflags.conf"
        - container: "index3"
          yaml: "/opt/dingo-store/dist/index1/conf/index.yaml"
          gflags: "/opt/dingo-store/dist/index1/conf/gflags.conf"
